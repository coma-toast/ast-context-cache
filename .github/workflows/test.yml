name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Install SQLite build deps
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev
      - name: Run tests
        run: make test
